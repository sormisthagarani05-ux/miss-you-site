<!DOCTYPE html>
<html>
<head>
  <title>Tap Tracker</title>
</head>

<body style="text-align:center; font-family:sans-serif; margin-top:100px;">

  <h1>Tap Tracker 💗</h1>

  <button onclick="sendTap()" style="font-size:20px; padding:10px 20px;">
    Tap 💗
  </button>

  <p id="status"></p>

  <script>
    function sendTap() {
      fetch("https://docs.google.com/forms/d/e/1FAIpQLScP3w-8LIrFkmkGvd5kkuFhrlcyNP9r_9B2e3TRYfz4ceYPdg/formResponse", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "entry.766837641=1"
      });

      document.getElementById("status").innerText = "Tapped 💗";
    }
  </script>

</body>
</html>
