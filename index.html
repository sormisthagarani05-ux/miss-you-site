<!DOCTYPE html>
<html>
<head>
  <title>Tap Tracker</title>

<body style="text-align:center; font-family:sans-serif; margin-top:100px;">
  <h1>Tap Tracker 💗</h1>

<button onclick="sendTap()" class="btn">Tap 💗</button>

<br><br>

<button onclick="window.open('https://docs.google.com/spreadsheets/d/1TSr0Srd-UBAzdKgT4isIaf5fiTo0EZmx7OY4KLff0q8/htmlview')" class="btn secondary">
View History 💗
</button>

<p id="status"></p>

<script>
function sendTap() {
  fetch("https://docs.google.com/forms/d/e/1FAIpQLScP3w-8LIrFkmkGvd5kkuFhrlcyN...", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "entry.766837641=1"
  });

  document.getElementById("status").innerText = "Sent 💗✨";
}
</script>

  <h1>Tap Tracker 💗</h1>

  <button onclick="sendTap()" style="font-size:20px; padding:10px 20px;">
    Tap 💗
  </button>
  <br><br>
<button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScP3w-8LIrFkmkGvd5kkuFhrlcyNP9r_9B2e3TRYfz4ceYPdg/viewform?usp=header')"
style="padding:10px 20px; border:none; border-radius:20px; background:#ff9ecb; color:white;">
View History 💗
</button>

  <p id="status"></p>

  <script>
    function sendTap() {
      fetch("https://docs.google.com/forms/d/e/1FAIpQLScP3w-8LIrFkmkGvd5kkuFhrlcyNP9r_9B2e3TRYfz4ceYPdg/formResponse", {

        },

      });

      document.getElementById("status").innerText = "Tapped 💗";
    }
  </script>

</body>
</html>
